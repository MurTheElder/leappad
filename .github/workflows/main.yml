name: Setup Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  setup-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Commit wrapper to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          git diff --staged --quiet || git commit -m "Add Gradle wrapper (generated by setup workflow)"
          git push
