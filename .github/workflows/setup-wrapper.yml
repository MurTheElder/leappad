# Leap! Pad — Gradle Wrapper Setup
# Run this ONCE before ever triggering the main build workflow.
# It installs Gradle, generates the gradlew wrapper script and gradle-wrapper.jar,
# and commits them directly to the repository.
# After this runs successfully, you can delete this workflow file if you like —
# it only ever needs to run once.
name: Setup Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  setup-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Verify wrapper was generated
        run: |
          if [ ! -f "gradlew" ]; then
            echo "ERROR: gradlew was not generated."
            exit 1
          fi
          echo "gradlew generated successfully."

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Commit wrapper to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          git diff --staged --quiet || git commit -m "Add Gradle wrapper (generated by setup workflow)"
          git push
