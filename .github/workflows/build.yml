name: Build Leap! Pad (Fabric)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Fabric jar
        run: ./gradlew :fabric:build --no-daemon

      - name: Find and verify jar
        run: |
          echo "Searching for jar in fabric/build/libs/:"
          find fabric/build/libs -type f -name "*.jar" | sort
          JAR_PATH=$(find fabric/build/libs -type f -name "leappad-fabric-*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -1)
          if [ -z "$JAR_PATH" ]; then
            echo "ERROR: No jar found. All files in fabric/build/libs/:"
            find fabric/build/libs -type f | sort
            exit 1
          fi
          echo "Jar found: $JAR_PATH"
          echo "JAR_PATH=$JAR_PATH" >> $GITHUB_ENV

      - name: Verify jar is a valid zip
        run: |
          if ! unzip -t "$JAR_PATH" > /dev/null 2>&1; then
            echo "ERROR: Jar file is not a valid zip archive."
            exit 1
          fi
          echo "Jar is a valid zip archive."

      - name: Verify jar contains fabric.mod.json
        run: |
          if ! unzip -l "$JAR_PATH" | grep -q "fabric.mod.json"; then
            echo "ERROR: fabric.mod.json not found inside jar."
            exit 1
          fi
          echo "fabric.mod.json confirmed present."

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: leappad-fabric-${{ github.run_number }}
          path: ${{ env.JAR_PATH }}
          if-no-files-found: error
